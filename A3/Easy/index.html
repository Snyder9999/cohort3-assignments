<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <main>
      <nav>
        <img src="./assets/squid-games-logo.png" alt="logo" class="logo" />
        <ul class="navigation">
          <li>About</li>
          <li style="opacity: 1;" id="highlited">Watch Now</li>
          <li>Actors</li>
          <li>Contact</li>
        </ul>
        <i class="ri-menu-3-fill"></i>
      </nav>
      <div class="hero">
        <div class="hero-left">
          <img src="./assets/squid-games-logo.png" alt="hero" class="hero-img" />
          <p class="brief">
            Action / Thriller / Drama Series directed by Dong-hyuk Hwang Season
            1: 9 Episodes
          </p>
          <div class="btns">

              <button class="btn" id="btn-1"><i class="ri-play-circle-fill"></i> Play Now</button>
              <button class="btn"><i class="ri-play-line"></i> Watch Trailer</button>
            </div>
        
        </div>
        <div class="hero-right">
            <div class="scroll">
                <div class="line"></div>
                <p>SCROLL</p>
            </div>
            <div class="socials">
                <i class="ri-twitter-line"></i>
                <i class="ri-instagram-line"></i>
                <i class="ri-facebook-fill"></i>
            </div>
        </div>
      </div>
    </main>
    <footer>
        <div class="clips">
            <div class="clip" id="card-1">
                <button class="play-btn">
                    <i class="ri-play-fill"></i>
                </button>
            </div>
            <div class="clip" id="card-2">
                <button class="play-btn">
                    <i class="ri-play-fill"></i>
                </button>
            </div>
            <div class="clip" id="card-3">
                <button class="play-btn">
                    <i class="ri-play-fill"></i>
                </button>
            </div>
        </footer>
    </div>
  </body>
</html>
