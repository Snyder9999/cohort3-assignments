<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main>
      <div class="hero1">
        <div class="navbar">
          <h1>INSECT</h1>
          <div class="searchbar">
            <label for="searchbar-text"><i class="ri-search-line"></i> </label>
            <input id="searchbar-text" type="search" placeholder="Search..." />
          </div>
        </div>
        <div class="classify">
          <h1>Classification</h1>
        </div>
        <div class="list">
          <div class="item">
            <h3>Class:</h3>
            <p>Insecta</p>
          </div>
          <div class="item">
            <h3>Order:</h3>
            <p>Coleoptera</p>
          </div>

          <div class="item">
            <h3>Family:</h3>
            <p>Cerambycidae</p>
          </div>

          <div class="item">
            <h3>Sub-Family:</h3>
            <p>Cerambycinae</p>
          </div>

          <div class="item">
            <h3>Tribe:</h3>
            <p>Callichromatini</p>
          </div>

          <div class="item">
            <h3>Genus:</h3>
            <p>Pachyteria</p>
          </div>
        </div>
      </div>
      <div class="hero2">
        <div class="navbar-right">
          <ul class="nagiv">
            <li>Home</li>
            <li>Shop</li>
            <li>About</li>
            <li>Gallery</li>
            <li>Contact</li>
          </ul>
        </div>
        <div class="right-hero">
          <div class="head">
            <h1>
              Pachyteria <br />
              equestris
            </h1>
          </div>
          <div class="insect-size">
            <div class="beetle-mm"><p>32mm</p></div>
            <div class="specs">
              <div class="spec-items">
                <p>Locality:</p>
                <p>Malaysia</p>
              </div>
              <div class="spec-items">
                <p>Sex:</p>
                <p>Male</p>
              </div>
              <div class="spec-items">
                <p>Size:</p>
                <p>32 mm / 12 mm</p>
              </div>
            </div>
          </div>
          <div class="cart">
            <h2>$5.99</h2>
            <button> add to collection</button>
          </div>
        </div>
      </div>
      <div class="insect"></div>
    </main>
  </body>
</html>
