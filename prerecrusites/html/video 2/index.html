<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tables_html</title>
</head>
<body>
    <h2>this is a table</h2>
    <table  border="2">
        <caption>students passed</caption>
        <colgroup>
        <col style="background-color: lightcyan;">
        <col style="background-color: lightyellow;">
        <col style="background-color: lightgreen;">
        </colgroup>
        <thead>
             <tr style="text-transform: uppercase;">
                <th>name</th>
                <th>roll</th>
                <th>gpa</th>
            </tr>
        </thead>
        <tbody style="text-transform: uppercase;">
            <tr>
                <td>sheikh masud</td>
                <td>11</td>
                <td>6.2</td>
            </tr>
            <tr>
                <td>akinur rahman</td>
                <td>1</td>
                <td>5.4</td>
            </tr>
            <tr>
                <td>aminul islam</td>
                <td>10</td>
                <td>5.5</td>
            </tr>
            
        </tbody>
        <tfoot style="text-transform: capitalize;">
            <tr>
                <th colspan="2">total students passed</th>
                <th>3</th>
            </tr>
        </tfoot>
    </table>    
</body>
</html>
